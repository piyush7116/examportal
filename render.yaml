databases:
  - name: examportal-db
    plan: free

services:
  - type: web
    name: examportal
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: examportal-db
          property: connectionString
      - key: ADMIN_REGISTRATION_SECRET
        sync: false
