<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Login{% endblock %} — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{font-family:'Poppins',sans-serif;}
    body{min-height:100vh;background:linear-gradient(135deg,#e8f0fe 0%,#f0faf5 100%);display:flex;align-items:center;justify-content:center;padding:30px 16px;}
    .auth-card{background:#fff;border-radius:20px;padding:40px 44px;box-shadow:0 8px 40px rgba(30,60,140,.10);width:100%;max-width:{% block card_width %}480px{% endblock %};}
    .back-link{color:#64748b;font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:28px;text-decoration:none;transition:color .2s;}
    .back-link:hover{color:#2563eb;}
    .auth-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:2rem;}
    .auth-card h2{font-weight:700;font-size:1.6rem;text-align:center;color:#1a1a2e;margin-bottom:4px;}
    .subtitle{text-align:center;color:#64748b;font-size:.9rem;margin-bottom:28px;}
    .form-label{font-weight:600;color:#374151;font-size:.88rem;}
    .form-control,.form-select{border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-family:'Poppins',sans-serif;font-size:.93rem;}
    .form-control:focus,.form-select:focus{border-color:{% block focus_color %}#2563eb{% endblock %};box-shadow:0 0 0 3px {% block focus_shadow %}rgba(37,99,235,.12){% endblock %};outline:none;}
    .btn-submit{background:{% block btn_bg %}linear-gradient(90deg,#1a56db,#2563eb){% endblock %};color:#fff;border:none;border-radius:10px;padding:13px;font-weight:600;font-size:1rem;width:100%;}
    .btn-submit:hover{opacity:.88;color:#fff;}
    .switch-link{text-align:center;font-size:.88rem;color:#64748b;margin-top:18px;}
    .switch-link a{color:{% block link_color %}#2563eb{% endblock %};font-weight:600;text-decoration:none;}
    .switch-link a:hover{text-decoration:underline;}
    .demo-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;text-align:center;font-size:.82rem;color:#94a3b8;margin-top:16px;}
    .alert{border-radius:10px;border:none;font-size:.88rem;}
    .alert-danger{background:#fef2f2;color:#dc2626;border-left:4px solid #ef4444;}
    .alert-success{background:#f0fdf4;color:#16a34a;border-left:4px solid #10b981;}
    .form-row{display:flex;gap:16px;}
    .form-row .form-group{flex:1;}
    @media(max-width:500px){.form-row{flex-direction:column;}.auth-card{padding:30px 20px;}}
  </style>
</head>
<body>
<div class="auth-card">
  <a class="back-link" href="/"><i class="bi bi-chevron-left"></i> Back to Role Selection</a>
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  {% block auth_content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
