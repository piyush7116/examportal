{% extends "base/base.html" %}
{% block title %}Add Subject{% endblock %}
{% block nav_links %}
<li class="nav-item"><a class="nav-link" href="/adminpanel/">Dashboard</a></li>
<li class="nav-item"><a class="nav-link active" href="/adminpanel/syllabus/">Syllabus</a></li>
<li class="nav-item"><a class="nav-link" href="/adminpanel/notifications/">Notifications</a></li>
<li class="nav-item"><a class="nav-link" href="/adminpanel/students/">Students</a></li>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7">
    <a href="/adminpanel/syllabus/" class="btn btn-link text-muted p-0 mb-3"><i class="bi bi-arrow-left me-1"></i>Back to Syllabus</a>
    <div class="card-portal p-4">
      <h4 style="font-weight:700;margin-bottom:20px;"><i class="bi bi-book me-2 text-primary"></i>Add New Subject</h4>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Subject Name</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. Data Structures" required/>
        </div>
        <div class="mb-4">
          <label class="form-label">Topics <small class="text-muted">(comma-separated)</small></label>
          <textarea name="topics" class="form-control" rows="4" placeholder="Arrays, Linked Lists, Stacks, Queues, Trees, Graphs..." required></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary-portal">Add Subject</button>
          <a href="/adminpanel/syllabus/" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
