{% extends "base/base.html" %}{% block title %}Edit Subject{% endblock %}
{% block nav_links %}<li class="nav-item"><a class="nav-link" href="/adminpanel/">Dashboard</a></li><li class="nav-item"><a class="nav-link active" href="/adminpanel/syllabus/">Syllabus</a></li>{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-12 col-md-7">
  <div class="card-portal p-4">
    <h4 style="font-weight:700;margin-bottom:20px;">Edit Subject: {{ subject.name }}</h4>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label">Subject Name</label><input type="text" name="name" class="form-control" value="{{ subject.name }}" required/></div>
      <div class="mb-4"><label class="form-label">Topics (comma-separated)</label><textarea name="topics" class="form-control" rows="4">{{ subject.topics }}</textarea></div>
      <div class="d-flex gap-2"><button type="submit" class="btn btn-primary-portal">Save</button><a href="/adminpanel/syllabus/" class="btn btn-outline-secondary">Cancel</a></div>
    </form>
  </div>
</div></div>
{% endblock %}
