{% extends "base/base.html" %}{% block title %}Send Notification{% endblock %}
{% block nav_links %}<li class="nav-item"><a class="nav-link" href="/adminpanel/">Dashboard</a></li><li class="nav-item"><a class="nav-link active" href="/adminpanel/notifications/">Notifications</a></li>{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-12 col-md-7">
<div class="card-portal p-4">
  <h4 style="font-weight:700;margin-bottom:20px;"><i class="bi bi-bell-fill me-2 text-success"></i>Send Notification</h4>
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">Title</label><input type="text" name="title" class="form-control" placeholder="Notification title" required/></div>
    <div class="mb-3"><label class="form-label">Message</label><textarea name="message" class="form-control" rows="4" placeholder="Notification message..." required></textarea></div>
    <div class="mb-4"><label class="form-label">Priority</label>
      <select name="priority" class="form-select">
        <option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option>
      </select>
    </div>
    <div class="d-flex gap-2"><button type="submit" class="btn btn-success-portal">Send</button><a href="/adminpanel/notifications/" class="btn btn-outline-secondary">Cancel</a></div>
  </form>
</div></div></div>
{% endblock %}
