{% extends "base/base.html" %}{% block title %}Give Exam Password{% endblock %}
{% block nav_links %}<li class="nav-item"><a class="nav-link" href="/adminpanel/">Dashboard</a></li><li class="nav-item"><a class="nav-link active" href="/adminpanel/exams/">Exams</a></li>{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-12 col-md-7">
<div class="card-portal p-4">
  <h4 style="font-weight:700;margin-bottom:20px;"><i class="bi bi-key-fill me-2 text-danger"></i>Manage Exam Passwords</h4>
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">Select Exam</label>
      <select name="exam_id" class="form-select" required>
        <option value="">Select exam</option>
        {% for e in exams %}<option value="{{ e.id }}">{{ e.title }} (current: {{ e.password }})</option>{% endfor %}
      </select>
    </div>
    <div class="mb-4"><label class="form-label">New Password</label><input type="text" name="new_password" class="form-control" placeholder="Enter new exam password" required/></div>
    <button type="submit" class="btn btn-warning-portal">Update Password</button>
  </form>
</div></div></div>
{% endblock %}
