{% extends "base/base.html" %}{% block title %}Create Exam{% endblock %}
{% block nav_links %}<li class="nav-item"><a class="nav-link" href="/adminpanel/">Dashboard</a></li><li class="nav-item"><a class="nav-link active" href="/adminpanel/exams/">Exams</a></li>{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-12 col-md-7">
<div class="card-portal p-4">
  <h4 style="font-weight:700;margin-bottom:20px;"><i class="bi bi-file-earmark-plus me-2 text-primary"></i>Create New Exam</h4>
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">Exam Title</label><input type="text" name="title" class="form-control" placeholder="e.g. Data Structures Mid-Semester" required/></div>
    <div class="mb-3"><label class="form-label">Subject</label>
      <select name="subject" class="form-select" required>
        <option value="">Select Subject</option>
        {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-md-4"><label class="form-label">Exam Password</label><input type="text" name="password" class="form-control" placeholder="e.g. exam2024" required/></div>
      <div class="col-md-4"><label class="form-label">Duration (minutes)</label><input type="number" name="duration" class="form-control" value="60" min="5" max="300"/></div>
      <div class="col-md-4"><label class="form-label">Total Marks</label><input type="number" name="total_marks" class="form-control" value="100" min="1"/></div>
    </div>
    <div class="d-flex gap-2"><button type="submit" class="btn btn-primary-portal">Create &amp; Add Questions</button><a href="/adminpanel/exams/" class="btn btn-outline-secondary">Cancel</a></div>
  </form>
</div></div></div>
{% endblock %}
