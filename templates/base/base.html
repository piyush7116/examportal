<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Online Examination Portal{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{font-family:'Poppins',sans-serif;}
    body{background:#f0f4ff;min-height:100vh;}

    /* ── NAVBAR ── */
    .navbar-exam{background:linear-gradient(90deg,#1a56db,#2563eb);padding:10px 24px;}
    .navbar-exam .navbar-brand{color:#fff;font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:8px;}
    .navbar-exam .nav-link{color:rgba(255,255,255,.85)!important;font-weight:500;padding:6px 14px;border-radius:6px;transition:background .2s;}
    .navbar-exam .nav-link:hover,.navbar-exam .nav-link.active{background:rgba(255,255,255,.15);color:#fff!important;}
    .navbar-exam .btn-logout{background:#ef4444;color:#fff;border:none;border-radius:8px;padding:7px 18px;font-weight:600;font-size:.88rem;}
    .navbar-exam .btn-logout:hover{background:#dc2626;color:#fff;}

    /* ── CARDS ── */
    .card-portal{border:none;border-radius:16px;box-shadow:0 4px 20px rgba(30,60,140,.08);transition:transform .2s,box-shadow .2s;}
    .card-portal:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(30,60,140,.13);}

    /* ── STAT CARDS ── */
    .stat-card{border-radius:14px;padding:20px 24px;background:#fff;border-left:4px solid #2563eb;}
    .stat-card.green{border-left-color:#10b981;}
    .stat-card.purple{border-left-color:#8b5cf6;}
    .stat-card.orange{border-left-color:#f59e0b;}
    .stat-card h2{font-size:2rem;font-weight:700;margin:0;}
    .stat-card p{color:#64748b;font-size:.85rem;margin:0;}

    /* ── ACTION CARDS ── */
    .action-card{border-radius:14px;padding:26px;color:#fff;cursor:pointer;transition:opacity .2s;}
    .action-card:hover{opacity:.92;}
    .action-card.blue{background:linear-gradient(135deg,#1a56db,#3b82f6);}
    .action-card.green{background:linear-gradient(135deg,#059669,#10b981);}
    .action-card.purple{background:linear-gradient(135deg,#7c3aed,#a78bfa);}
    .action-card.orange{background:linear-gradient(135deg,#d97706,#f59e0b);}
    .action-card.red{background:linear-gradient(135deg,#dc2626,#f87171);}

    /* ── FEATURE CARDS ── */
    .feature-card{border-radius:16px;padding:28px;background:#fff;border:2px solid transparent;
      cursor:pointer;transition:all .22s;box-shadow:0 2px 12px rgba(30,60,140,.06);}
    .feature-card:hover{border-color:#2563eb;transform:translateY(-4px);box-shadow:0 10px 30px rgba(37,99,235,.12);}
    .feature-icon{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:16px;}

    /* ── BADGES ── */
    .badge-high{background:#fee2e2;color:#dc2626;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:600;}
    .badge-medium{background:#fef3c7;color:#d97706;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:600;}
    .badge-low{background:#d1fae5;color:#059669;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:600;}

    /* ── FORMS ── */
    .form-control,.form-select{border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-family:'Poppins',sans-serif;}
    .form-control:focus,.form-select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    .form-label{font-weight:600;color:#374151;font-size:.88rem;}

    /* ── BUTTONS ── */
    .btn-primary-portal{background:linear-gradient(90deg,#1a56db,#2563eb);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-weight:600;transition:opacity .2s;}
    .btn-primary-portal:hover{opacity:.88;color:#fff;}
    .btn-success-portal{background:linear-gradient(90deg,#059669,#10b981);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-weight:600;transition:opacity .2s;}
    .btn-success-portal:hover{opacity:.88;color:#fff;}
    .btn-warning-portal{background:linear-gradient(90deg,#d97706,#f59e0b);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-weight:600;transition:opacity .2s;}
    .btn-warning-portal:hover{opacity:.88;color:#fff;}

    /* ── PAGE HEADER ── */
    .page-header{margin-bottom:28px;}
    .page-header h1{font-weight:700;font-size:1.8rem;color:#1a1a2e;margin-bottom:4px;}
    .page-header p{color:#64748b;font-size:.93rem;margin:0;}

    /* ── TABLE ── */
    .table-portal{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(30,60,140,.06);}
    .table-portal thead th{background:#f8fafc;color:#374151;font-weight:600;font-size:.85rem;border:none;padding:14px 16px;}
    .table-portal tbody td{padding:13px 16px;color:#475569;border-color:#f1f5f9;vertical-align:middle;}

    /* ── MESSAGES ── */
    .alert{border-radius:10px;border:none;}
    .alert-success{background:#f0fdf4;color:#16a34a;border-left:4px solid #10b981;}
    .alert-danger{background:#fef2f2;color:#dc2626;border-left:4px solid #ef4444;}
    .alert-warning{background:#fffbeb;color:#d97706;border-left:4px solid #f59e0b;}

    /* ── TOPIC CHIPS ── */
    .topic-chip{display:inline-block;padding:5px 14px;border-radius:20px;
      background:#eff6ff;color:#2563eb;font-size:.82rem;font-weight:500;
      border:1px solid #bfdbfe;margin:3px;}

    /* ── EXAM TIMER ── */
    #timer-box{background:linear-gradient(90deg,#1a56db,#2563eb);color:#fff;
      border-radius:12px;padding:10px 20px;font-size:1.1rem;font-weight:700;
      display:inline-flex;align-items:center;gap:8px;}
    #timer-box.warning{background:linear-gradient(90deg,#dc2626,#ef4444);}

    .avatar-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;color:#fff;font-weight:700;font-size:.95rem;}
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-exam navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      <div style="background:rgba(255,255,255,.2);border-radius:8px;padding:6px 10px;">
        <i class="bi bi-book-fill"></i>
      </div>
      ExamPortal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <i class="bi bi-list" style="color:#fff;font-size:1.4rem;"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
        {% block nav_links %}{% endblock %}
        <li class="nav-item ms-2">
          <a href="/logout/" class="btn btn-logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}

<div class="{% if user.is_authenticated %}container-fluid px-4 py-4{% endif %}">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show mb-3" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
