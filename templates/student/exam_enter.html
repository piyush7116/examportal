{% extends "student/student_base.html" %}
{% block title %}Enter Exam{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card-portal p-5 text-center">
      <div style="width:72px;height:72px;border-radius:50%;background:#d1fae5;color:#10b981;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 20px;">
        <i class="bi bi-lock-fill"></i>
      </div>
      <h4 style="font-weight:700;">{{ exam.title }}</h4>
      <p class="text-muted">Subject: {{ exam.subject.name }} &bull; {{ exam.duration_minutes }} minutes &bull; {{ exam.total_marks }} marks</p>
      <hr/>
      <form method="post">
        {% csrf_token %}
        <div class="mb-4 text-start">
          <label class="form-label">Exam Password</label>
          <input type="password" name="exam_password" class="form-control" placeholder="Enter the password provided by your teacher" required/>
        </div>
        <button type="submit" class="btn btn-success-portal w-100">Enter Exam <i class="bi bi-arrow-right ms-1"></i></button>
      </form>
      <a href="/student/exams/" class="btn btn-link mt-2 text-muted">← Back to Exams</a>
    </div>
  </div>
</div>
{% endblock %}
